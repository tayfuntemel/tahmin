name: 03 - Yarin Incremental Sizintisiz Stats ve Predict

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:
    inputs:
      predict_date:
        description: 'Tahmin üretilecek tarih. Boş kalırsa Türkiye saatine göre yarını alır. Örnek: 2026-05-05'
        required: false
        default: ''
      stats_mode:
        description: 'auto: cache boşsa full, doluysa incremental. full veya incremental da yazabilirsin.'
        required: false
        default: 'auto'
      clear_existing:
        description: 'Bu prediction_date için eski tahminleri silip baştan yazsın mı? 1 evet, 0 hayır.'
        required: false
        default: '1'
      force_full_rebuild:
        description: 'İstatistik cache tamamen baştan kurulsun mu? 1 evet, 0 hayır.'
        required: false
        default: '0'

concurrency:
  group: yarin-incremental-sizintisiz-group
  cancel-in-progress: false

jobs:
  yarin-stats-predict:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONIOENCODING: utf-8
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_PORT: ${{ secrets.DB_PORT }}
      SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      BACKTEST_PREDICT_DATE: ${{ github.event.inputs.predict_date }}
      STATS_MODE: ${{ github.event.inputs.stats_mode || 'auto' }}
      CLEAR_EXISTING_PREDICTIONS: ${{ github.event.inputs.clear_existing || '1' }}
      FORCE_FULL_REBUILD: ${{ github.event.inputs.force_full_rebuild || '0' }}

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamini Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install mysql-connector-python requests numpy
          pip list

      - name: Yarin Icin Incremental Sizintisiz Stats ve Predict Calistir
        run: python backtest_yarin_incremental_sizintisiz_final.py "$BACKTEST_PREDICT_DATE"
