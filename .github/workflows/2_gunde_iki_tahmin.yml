name: 2-gunde iki kez tahmin

on:
  schedule:
    - cron: '15 8,20 * * *'
  workflow_dispatch:

jobs:
  tahmin_yap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python playwright
          playwright install chromium
      - name: once en guncel maclari cek
        run: python mac_cek_guncelle.py
      - name: sonra tahminleri olustur
        run: python tahmin_olustur.py
