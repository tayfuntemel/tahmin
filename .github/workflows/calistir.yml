name: 02 Generate Football Predictions

on:
  workflow_dispatch:

  schedule:
    # Türkiye saatiyle yaklaşık her gün 09:00
    # GitHub cron UTC çalışır. 06:00 UTC = 09:00 TR
    - cron: "0 6 * * *"

    # Türkiye saatiyle yaklaşık her gün 13:00
    - cron: "0 10 * * *"

    # Türkiye saatiyle yaklaşık her gün 17:00
    - cron: "0 14 * * *"

    # Türkiye saatiyle yaklaşık her gün 21:00
    - cron: "0 18 * * *"

jobs:
  generate-predictions:
    runs-on: ubuntu-latest

    timeout-minutes: 20

    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_PORT: ${{ secrets.DB_PORT }}

      LOOKBACK_DAYS: "550"
      TARGET_DAYS_AHEAD: "1"
      MIN_TEAM_MATCHES: "5"
      MIN_LEAGUE_MATCHES: "10"
      MIN_CONFIDENCE: "0.66"
      MODEL_VERSION: "v6_no_corners_selective_market_floor_2026_05_15"

      # İyi giden 3 market daha ulaşılabilir; diğerleri daha seçici.
      MIN_SECOND_HALF_BTTS: "0.66"
      MIN_TOTAL_GOALS_2_3: "0.66"
      MIN_AWAY_SCORES_BOTH_HALVES: "0.67"
      MIN_FIRST_HALF_BTTS: "0.70"
      MIN_HOME_SCORES_BOTH_HALVES: "0.70"
      MIN_HOME_WINS_BOTH_HALVES: "0.76"
      MIN_AWAY_WINS_BOTH_HALVES: "0.76"
      MIN_TOTAL_GOALS_0_1: "0.70"
      MIN_TOTAL_GOALS_4_5: "0.72"
      MIN_TOTAL_GOALS_6_PLUS: "0.78"
      MIN_BOTH_HALVES_OVER_1_5: "0.73"
      MIN_BOTH_HALVES_UNDER_1_5: "0.72"

      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python

      - name: Run prediction generator
        run: |
          python generate_predictions.py
