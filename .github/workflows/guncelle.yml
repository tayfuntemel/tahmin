name: Maclari Guncelle (Her 10 Dakikada Bir)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '40 9,17,23 * * *'
  workflow_dispatch:

concurrency:
  group: maclari-guncelle-group
  cancel-in-progress: false

jobs:
  run-guncelle-script:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # scriptin maksimum 10 dakikada bitmesini bekle
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python requests

      - name: Güncelleme Scriptini Çalıştır
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python guncelle.py