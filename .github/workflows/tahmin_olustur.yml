name: tahmin_olustur

on:
  schedule:
    # Her gün saat 00:20'de (UTC) çalışır
    - cron: '20 0 * * *'
  workflow_dispatch:

jobs:
  tahmin_yap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 📦 Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python
          
      - name: 🚀 Tahminleri Oluştur
        # Mac çekme adımı kaldırıldı, doğrudan tahmin scripti çalıştırılıyor
        run: python tahmin_olustur.py
