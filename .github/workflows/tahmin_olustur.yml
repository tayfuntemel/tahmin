name: tahmin_olustur

# --- GLOBAL SEVİYE: KESİN ÇÖZÜM ---
# Ayarı buraya koyarak Runner'ı daha işe başlamadan Node.js 24 kullanmaya zorluyoruz.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# -----------------------------------

on:
  schedule:
    # Türkiye Saati ile her gün 02:20'de çalışır (UTC 23:20)
    - cron: '20 21 * * *'
  workflow_dispatch:

jobs:
  tahmin_yap:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4
      
      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          # Pandas ve makine öğrenmesi kütüphaneleri buraya eklendi
          pip install mysql-connector-python pandas numpy scikit-learn joblib
          
      - name: 🚀 Tahminleri Oluştur
        env: # Şifrelerimizi koda aktarıyoruz
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python tahmin_olustur.py
