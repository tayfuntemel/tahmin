name: tahmin_olustur

on:
  schedule:
    # Türkiye Saati ile her gün 02:20'de çalışır (UTC 23:20)
    - cron: '20 23 * * *'
  workflow_dispatch:

jobs:
  tahmin_yap:
    runs-on: ubuntu-latest
    # --- KRİTİK EKLEME: Node.js 24 Zorlaması ---
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # ------------------------------------------
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4
      
      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python
          
      - name: 🚀 Tahminleri Oluştur
        run: python tahmin_olustur.py
