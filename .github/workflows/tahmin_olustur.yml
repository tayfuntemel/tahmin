name: tahmin_olustur

on:
  schedule:
    # Türkiye Saati ile her gün 02:20'de çalışır (UTC 23:20)
    - cron: '20 23 * * *'
  workflow_dispatch:

jobs:
  tahmin_yap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python
          
      - name: 🚀 Tahminleri Oluştur
        # Mac çekme adımı kaldırıldı, doğrudan tahmin scripti çalıştırılıyor
        run: python tahmin_olustur.py
