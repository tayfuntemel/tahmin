name: Model Eğitimi Güncelleme

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

# Botun senin repona dosya yükleyebilmesi için gerekli izin:
permissions:
  contents: write

jobs:
  model-egitme-sureci:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Getir
        uses: actions/checkout@v4
        
      - name: Python Ortamını Hazırla
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python pandas numpy scikit-learn joblib
          
      - name: Eğitim Betiğini Çalıştır
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python model_egit.py
        
      - name: Eğitilen Modelleri GitHub'a Kaydet
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # .gitignore engeline takılmamak için -f (force) parametresi ile ZORLA eklendi
          git add -f models/
          
          git commit -m "🤖 Yeni modeller eğitildi ve yüklendi" || echo "Değişiklik yok"
          git push origin HEAD:main
