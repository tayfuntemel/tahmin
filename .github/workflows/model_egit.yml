name: Model Eğitimi Güncelleme

# GitHub Actions Node.js 24 uyarısını engellemek için
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Her ayın 1'inde, Türkiye saati ile sabah 03:00'te çalışır (UTC 00:00)
    # Dakika Saat AyınGünü Ay HaftanınGünü
    - cron: '0 0 1 * *'
  workflow_dispatch: # Actions sekmesinden manuel tetiklemeye izin verir

jobs:
  model-egitme-sureci:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Getir
        uses: actions/checkout@v4
        
      - name: Python Ortamını Hazırla
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          # Hata aldığın pandas ve diğer temel kütüphaneleri buraya ekledik
          pip install mysql-connector-python pandas numpy scikit-learn
          
      - name: Eğitim Betiğini Çalıştır
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python model_egit.py
