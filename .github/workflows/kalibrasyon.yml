name: Model Kalibrasyonunu Guncelle

# GitHub Actions Node.js 24 uyarısını engellemek için
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Türkiye Saati ile her sabah 08:30'da çalışır (UTC 05:30)
    # Tahmin oluşturma betiklerinden ÖNCE çalışması önemlidir.
    - cron: '10 21 * * *'
  workflow_dispatch: # Actions sekmesinden manuel tetiklemeye izin verir

jobs:
  kalibrasyon-yap:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        
      - name: Python'u Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python
          
      - name: Kalibrasyon Betiğini Çalıştır
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python kalibrasyon.py
