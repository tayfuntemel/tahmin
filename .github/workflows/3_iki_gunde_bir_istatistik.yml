name: 3-iki gunde bir istatistik

on:
  schedule:
    - cron: '30 4 */2 * *'
  workflow_dispatch:

jobs:
  istatistik_guncelle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python
      - name: tum istatistik ve analizleri baslat
        run: |
          python takim_istatislik.py
          python takim_ilkyari_istatislik.py
          python takim_ikinciyari_istatislik.py
          python takim_form_seri.py
          python takim_xg_istatislikleri.py
          python lig_istatislik.py
          python hakem_istatislik.py
          python oran_istatislikleri.py
