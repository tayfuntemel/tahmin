name: tum_istatistikler

# --- GLOBAL SEVİYE: KESİN ÇÖZÜM ---
# Ayarı buraya koyarak tüm aksiyonların en baştan Node.js 24 ile çalışmasını sağlıyoruz.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# -----------------------------------

on:
  schedule:
    # Her 2 günde bir saat 04:30'da (UTC) çalışır
    - cron: '30 4 */2 * *'
  workflow_dispatch:

jobs:
  istatistik_guncelle:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4
        
      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python
          
      - name: 🚀 Tüm İstatistik ve Analizleri Başlat
        env: # Şifrelerimizi bu adımdaki tüm Python dosyalarına aktarıyoruz
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        # NOT: Artık 7 farklı dosya yerine sadece birleştirdiğimiz tek dosyayı çalıştırıyoruz.
        # Eğer birleştirdiğin dosyanın adını 'tum_istatistikler.py' yapmadıysan, buradaki ismi de değiştirmeyi unutma.
        run: |
          python tum_istatistikler.py
