name: Haftalik Tahminleri Calistir (Otomatik Sıralı)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Model eğitim yılı (Örn: 2026)'
        required: true
        default: '2026'
      start_week:
        description: 'Başlangıç model haftası (Örn: 10) -> bu hafta modeliyle bir sonraki hafta tahmini'
        required: true
        default: '10'
      end_week:
        description: 'Bitiş model haftası (Örn: 15) -> bu hafta modeliyle +1 hafta tahmini'
        required: true
        default: '15'
      # Opsiyonel: Tek bir çift için manuel çalıştırmak isterseniz
      single_model_week:
        description: 'Tek çift için model haftası (boş bırakılırsa start_week-end_week arası çalışır)'
        required: false
        default: ''
      single_target_week:
        description: 'Tek çift için tahmin haftası (boş bırakılırsa model_week+1)'
        required: false
        default: ''

jobs:
  tahmin-sureci:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Getir
        uses: actions/checkout@v4

      - name: Python Ortamını Hazırla
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python pandas numpy scikit-learn joblib

      - name: Otomatik Sıralı Tahminleri Yap
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: |
          YEAR="${{ github.event.inputs.year }}"
          START_WEEK="${{ github.event.inputs.start_week }}"
          END_WEEK="${{ github.event.inputs.end_week }}"
          SINGLE_MODEL="${{ github.event.inputs.single_model_week }}"
          SINGLE_TARGET="${{ github.event.inputs.single_target_week }}"
          
          if [ -n "$SINGLE_MODEL" ]; then
            # Tek çift modu
            if [ -n "$SINGLE_TARGET" ]; then
              TARGET_WEEK=$SINGLE_TARGET
            else
              TARGET_WEEK=$((SINGLE_MODEL + 1))
            fi
            echo "🔮 Tek çift tahmini: model haftası $SINGLE_MODEL -> tahmin haftası $TARGET_WEEK"
            python predict_weekly.py --model-year $YEAR --model-week $SINGLE_MODEL --target-week $TARGET_WEEK
          else
            # Otomatik sıralı: start_week'ten end_week'e kadar her model_week için model_week+1 tahmini
            echo "🔄 Otomatik sıralı tahmin modu: model haftaları $START_WEEK ile $END_WEEK arası"
            for MODEL_WEEK in $(seq $START_WEEK $END_WEEK); do
              TARGET_WEEK=$((MODEL_WEEK + 1))
              echo "----- Model haftası $MODEL_WEEK -> Tahmin haftası $TARGET_WEEK -----"
              python predict_weekly.py --model-year $YEAR --model-week $MODEL_WEEK --target-week $TARGET_WEEK
            done
          fi
