name: Daily Predictions

on:
  schedule:
    # Her gün Türkiye saatiyle sabah 09:00'da çalışır (UTC 06:00)
    - cron: '0 6 * * *'
  workflow_dispatch:   # manuel çalıştırma imkanı

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run prediction script
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python predict.py

      - name: Upload prediction report as artifact (opsiyonel)
        uses: actions/upload-artifact@v4
        with:
          name: prediction-report
          path: prediction_output.txt   # eğer çıktıyı dosyaya yazdırmak isterseniz
