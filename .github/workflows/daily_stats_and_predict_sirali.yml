name: Daily Stats & Predictions Sirali

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # maclari_guncelle.yml her 3 saatte bir 00:00, 03:00, 06:00... UTC çalışıyor.
    # Bu workflow 01:30 UTC'de çalışır; yani 00:00 UTC güncellemesinden 1,5 saat sonra.
    # Türkiye saatiyle 04:30'da çalışır.
    - cron: '30 1 * * *'
  workflow_dispatch:

concurrency:
  group: daily-stats-and-predict-sirali-group
  cancel-in-progress: false

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      PYTHONIOENCODING: utf-8
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_PORT: ${{ secrets.DB_PORT }}
      SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install mysql-connector-python requests
          pip list

      - name: 1 - Fikstür Çek
        run: python fikstur_cek122.py

      - name: 2 - Maçları Güncelle
        env:
          WORK_MINUTES: 9
          LOOP_WAIT_SECONDS: 60
        run: python maclari_guncelle122.py

      - name: 3 - İstatistik Tablolarını Güncelle
        run: python update_stats.py

      - name: 4 - Tahminleri Çalıştır
        run: python predict.py
