name: Daily Full Pipeline

on:
  schedule:
    # GitHub cron UTC çalışır. 21:40 UTC = Türkiye saati 00:40 civarıdır.
    - cron: '40 21 * * *'
  workflow_dispatch:

concurrency:
  group: daily-full-pipeline
  cancel-in-progress: false

env:
  PYTHONIOENCODING: utf-8
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  full-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install mysql-connector-python requests
          pip list

      - name: 1) Fikstürü Çek
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python fikstur_cek122.py

      - name: 2) Maçları Güncelle
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python maclari_guncelle122.py

      - name: 3) İstatistik Tablolarını Güncelle
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python update_stats.py

      - name: 4) Tahminleri Çalıştır
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python predict.py
