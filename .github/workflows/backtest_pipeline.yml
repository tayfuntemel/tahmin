name: Sistem Guncelleme

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Her gece çalışacak şekilde ayarlandı
    - cron: '0 0 * * *' 
  workflow_dispatch:    # GitHub arayüzünden manuel "Run workflow" butonu

permissions:
  contents: write       # Botun repoya modelleri yazma izni

jobs:
  sistem-guncelleme-sureci:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Getir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Push çakışmalarını önlemek için tüm geçmişi çeker

      - name: Python Ortamını Hazırla
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # requirements.txt hatası vermemesi için cache bilerek eklenmedi!

      - name: Bağımlılıkları Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python pandas numpy scikit-learn joblib xgboost scipy
          
      - name: Full Pipeline Çalıştır (İstatistik + Eğitim + Tahmin)
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: |
          # --mode full komutu sırasıyla: 
          # 1. İstatistikleri hesaplar 
          # 2. T-1 verisiyle modeli eğitir 
          # 3. Gelecek maçları tahmin edip veritabanına yazar
          python backtest_pipeline.py --mode full
        
      - name: Modelleri Zorla Kaydet ve Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # models klasörünü zorla github'a ekle
          git add -f models/
          
          # Değişiklik yoksa (örneğin veri azlığından model eğitilemediyse) çökmemesi için koruma
          git commit -m "🤖 [OTOMATİK] İstatistikler, modeller ve tahminler güncellendi" || echo "Degisiklik yok"
          
          # İŞTE ÇÖKMEYİ ENGELLEYEN KISIM: Araya giren yeni Python kodlarını vb. çek ve kendi commitini üste koy
          git pull --rebase origin main
          
          # Dosyaları repoya güvenle gönder
          git push origin HEAD:main
