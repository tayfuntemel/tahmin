name: Maclari Guncelle (Her 10 Dakikada Bir)

# --- GLOBAL SEVİYE: KESİN ÇÖZÜM ---
# Ayarı buraya koyarak Runner'ı henüz işe başlamadan Node.js 24 motoruna zorluyoruz.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# -----------------------------------

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

# İŞTE BURASI ÇOK ÖNEMLİ (ÇAKIŞMA ÖNLEYİCİ)
concurrency:
  group: maclari-guncelle-group
  cancel-in-progress: false

jobs:
  run-guncelle-script:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python playwright
          playwright install chromium

      - name: Güncelleme Scriptini Çalıştır
        run: python maclari_guncelle.py
