name: Maclari Guncelle (Her 10 Dakikada Bir)

on:
  schedule:
    # Her 10 dakikada bir çalıştırır
    - cron: '*/10 * * * *'
  workflow_dispatch: # Bu satır, GitHub üzerinden manuel olarak da butona basıp çalıştırabilmeni sağlar

jobs:
  run-guncelle-script:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v3

      - name: Python Ortamını Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python playwright
          playwright install chromium

      - name: Güncelleme Scriptini Çalıştır
        run: python maclari_guncelle.py
