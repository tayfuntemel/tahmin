name: Maclari Guncelle (Her 10 Dakikada Bir)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-guncelle-script:
    runs-on: ubuntu-latest
    # --- KRİTİK NOKTA BURASI ---
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # ---------------------------
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4 # Eğer v5 çıktıysa v5 yapabilirsin

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5 # Eğer v6 çıktıysa v6 yapabilirsin
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python playwright
          playwright install chromium

      - name: Güncelleme Scriptini Çalıştır
        run: python maclari_guncelle.py
