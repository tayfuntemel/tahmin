name: Fikstur Cek (Gunde 2 Kez)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 21,11 * * *'
  workflow_dispatch:

jobs:
  run-fikstur-script:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          # DİKKAT: playwright-stealth kütüphanesini ekledik
          pip install mysql-connector-python playwright playwright-stealth
          playwright install --with-deps chromium

      - name: Fikstür Scriptini Çalıştır
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python fikstur_cek3.py
