name: en_iyi_tahmin_kaydet

on:
  schedule:
    # Türkiye Saati ile her gün 02:40'ta çalışır (UTC 23:40)
    - cron: '40 23 * * *'
  workflow_dispatch:

jobs:
  tahmin-kaydet:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        
      - name: Python'u Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python
          
      - name: En İyi Tahminleri Veritabanına Yaz
        run: python en_iyi_tahminleri_kaydet.py
