name: En İyi Tahminleri Kaydet

on:
  schedule:
    # Her gün saat 00:40'ta (UTC) çalışır
    - cron: '40 0 * * *'
  workflow_dispatch:

jobs:
  tahmin-kaydet:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
      - name: Python'u Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python
      - name: En İyi Tahminleri Veritabanına Yaz
        run: python en_iyi_tahminleri_kaydet.py
