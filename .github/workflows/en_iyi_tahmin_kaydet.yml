name: en_iyi_tahmin_kaydet

# --- KESİN ÇÖZÜM: GLOBAL ENV ---
# Ayarı buraya, en tepeye koyuyoruz ki tüm adımlar Node.js 24 ile çalışsın.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# -------------------------------

on:
  schedule:
    # Türkiye Saati ile her gün 02:40'ta çalışır (UTC 23:40)
    - cron: '40 23 * * *'
  workflow_dispatch:

jobs:
  tahmin-kaydet:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        
      - name: Python'u Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python
          
      - name: En İyi Tahminleri Veritabanına Yaz
        env: # Şifrelerimizi koda aktarıyoruz
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python en_iyi_tahminleri_kaydet.py
