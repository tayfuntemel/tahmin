name: Daily Stats & Predictions

on:
  schedule:
    - cron: '21 40 * * *'   # UTC 05:05 -> Türkiye 08:05
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Kodu Checkout Et
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        # Pip'i güncelliyoruz ve gereksinimleri kuruyoruz. 
        # Kurulum bitince kurulu paketleri listeliyoruz (Hata ayıklamak için)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list 

      - name: İstatistik Tablolarını Güncelle
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python update_stats.py

      - name: Tahminleri Çalıştır
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python predict.py
