name: iki_gunde_bir_istatistik

# --- GLOBAL SEVİYE: KESİN ÇÖZÜM ---
# Ayarı buraya koyarak tüm aksiyonların en baştan Node.js 24 ile çalışmasını sağlıyoruz.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# -----------------------------------

on:
  schedule:
    # Her 2 günde bir saat 04:30'da (UTC) çalışır
    - cron: '30 4 */2 * *'
  workflow_dispatch:

jobs:
  istatistik_guncelle:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4
      
      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 📦 Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python
          
      - name: 🚀 Tüm İstatistik ve Analizleri Başlat
        run: |
          python takim_istatislik.py
          python takim_ilkyari_istatislik.py
          python takim_ikinciyari_istatislik.py
          python takim_form_seri.py
          python takim_xg_istatislikleri.py
          python lig_istatislik.py
          python hakem_istatislik.py
          python oran_istatislikleri.py
