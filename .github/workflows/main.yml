name: tahmin_sistemini_calistir

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  tahminleri_olustur:
    runs-on: ubuntu-latest
    
    steps:
      - name: repoyu_kopyala
        uses: actions/checkout@v3

      - name: python_kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: kutuphaneleri_ve_tarayiciyi_yukle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python playwright
          playwright install chromium

      - name: verileri_cek_ve_veritabanina_yaz
        run: python mac_cek_guncelle.py

      - name: istatistik_ve_analizleri_guncelle
        run: |
          python takim_istatislik.py
          python takim_ilkyari_istatislik.py
          python takim_ikinciyari_istatislik.py
          python takim_form_seri.py
          python takim_xg_istatislikleri.py
          python lig_istatislik.py
          python hakem_istatislik.py
          python oran_istatislikleri.py

      - name: final_tahminleri_olustur
        run: python tahmin_olustur.py
