name: Haftalik Tum Modelleri Egit (Parametreli)

on:
  workflow_dispatch:
    inputs:
      max_year:
        description: 'Maksimum yıl (örn: 2026)'
        required: true
        default: '2026'
        type: string
      max_week:
        description: 'Maksimum hafta (örn: 10)'
        required: true
        default: '10'
        type: string

permissions:
  contents: write

jobs:
  model-egitim-sureci:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Getir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy mysql-connector-python scikit-learn joblib

      - name: Modelleri Eğit (Belirtilen yıl ve haftaya kadar)
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: |
          python train_all_models.py \
            --max-year ${{ github.event.inputs.max_year }} \
            --max-week ${{ github.event.inputs.max_week }}

      - name: Oluşan Modelleri GitHub'a Gönder
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          git commit -m "🤖 Model güncellemesi - yıl ${{ github.event.inputs.max_year }} hafta ${{ github.event.inputs.max_week }}" || echo "Değişiklik yok"
          git pull --rebase origin main
          git push origin HEAD:main
