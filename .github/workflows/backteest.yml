name: 05 - Backtest 90 Gun Incremental Sizintisiz

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Tahminlerin başlayacağı tarih. 90 gün için default: 2026-02-04.'
        required: false
        default: '2026-02-04'
      end_date:
        description: 'Tahminlerin biteceği tarih. 90 gün için default: 2026-05-04.'
        required: false
        default: '2026-05-04'
      clear_existing:
        description: 'Bu tarih aralığındaki eski prediction kayıtlarını silip baştan yazsın mı? 1 evet, 0 hayır.'
        required: false
        default: '1'

concurrency:
  group: backtest-90gun-incremental-sizintisiz-group
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      PYTHONIOENCODING: utf-8
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_PORT: ${{ secrets.DB_PORT }}
      SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      BACKTEST_START_DATE: ${{ github.event.inputs.start_date }}
      BACKTEST_END_DATE: ${{ github.event.inputs.end_date }}
      CLEAR_EXISTING_BACKTEST_PREDICTIONS: ${{ github.event.inputs.clear_existing }}

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install mysql-connector-python requests numpy
          pip list

      - name: 90 Gunluk Incremental Sizintisiz Backtest Calistir
        run: python backtest_90gun_incremental_sizintisiz_final.py "$BACKTEST_END_DATE"
