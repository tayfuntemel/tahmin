name: 03 - Safe Market Backtest

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Türkiye saati 04:00 için UTC 01:00
    - cron: "0 1 * * *"

  workflow_dispatch:
    inputs:
      start_date:
        description: "Backtest başlangıç tarihi. Örnek: 2026-04-15"
        required: false
        default: ""
      end_date:
        description: "Backtest bitiş tarihi. Örnek: 2026-05-04"
        required: false
        default: ""

concurrency:
  group: safe-market-backtest-group
  cancel-in-progress: false

jobs:
  safe-market-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PYTHONIOENCODING: utf-8
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_PORT: ${{ secrets.DB_PORT }}

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML mysql-connector-python
          python -m pip show PyYAML
          python -m pip show mysql-connector-python
          python - <<'PY'
          import yaml
          import mysql.connector
          print("PyYAML ve mysql-connector-python hazır.")
          PY

      - name: Safe Market Backtest Çalıştır
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ] && [ -n "${{ github.event.inputs.end_date }}" ]; then
            python safe_market_backtest.py --config config/safe_market_backtest.yml --start "${{ github.event.inputs.start_date }}" --end "${{ github.event.inputs.end_date }}"
          else
            python safe_market_backtest.py --config config/safe_market_backtest.yml
          fi
