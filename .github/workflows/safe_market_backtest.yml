name: Safe Market Backtest

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Türkiye saati 04:00 = UTC 01:00
    - cron: "0 1 * * *"

  workflow_dispatch:
    inputs:
      start_date:
        description: "Backtest başlangıç tarihi. Örnek: 2026-04-15"
        required: false
        default: "2026-04-15"
      end_date:
        description: "Backtest bitiş tarihi. Örnek: 2026-05-04"
        required: false
        default: "2026-05-04"

concurrency:
  group: safe-market-backtest-group
  cancel-in-progress: false

jobs:
  safe-market-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PYTHONIOENCODING: utf-8
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_PORT: ${{ secrets.DB_PORT }}

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install PyYAML mysql-connector-python requests
          python - <<'PY'
          import yaml
          import mysql.connector
          import requests
          print("Kütüphaneler hazır.")
          PY

      - name: Backtest Config Dosyasını Oluştur
        run: |
          mkdir -p config

          cat > config/safe_market_backtest.yml <<'YAML'
          database:
            host: "${DB_HOST}"
            user: "${DB_USER}"
            password: "${DB_PASSWORD}"
            name: "${DB_NAME}"
            port: "${DB_PORT}"
            source_table: "results_football"
            result_table: "safe_market_backtest_results"

          backtest:
            start_date: "2026-04-15"
            end_date: "2026-05-04"
            lookback_days: 500
            clear_before_run: true

          markets:
            enabled:
              - "O05"
              - "O15"
              - "U45"
              - "U35"
              - "U55"
              - "DC_1X"
              - "DC_X2"
              - "DC_12"
              - "BTTS_NO"
              - "BTTS_YES"
              - "U25"
              - "O25"

          thresholds:
            max_daily_picks: 3
            min_model_prob: 80.0
            min_edge: 2.5
            min_confidence: 82.0
            max_risk_score: 28.0
            min_league_sample: 30
            min_team_total_sample: 16

          scoring:
            global_prior: 0.62
            league_weight: 0.42
            home_weight: 0.22
            away_weight: 0.22
            h2h_weight: 0.14
            min_sample_for_full_weight: 40
            min_total_sample: 80
            edge_confidence_multiplier: 85.0
            sample_confidence_multiplier: 0.08

          risk:
            odds_risk_multiplier: 18.0
            volatility_risk_multiplier: 7.0
            no_h2h_penalty: 3.0
            low_team_sample_limit: 8
            low_team_sample_penalty: 5.0

          market_limits:
            O05:
              label: "0.5 ÜST"
              min_odds: 1.01
              max_odds: 1.25
              risk_weight: 2.0

            O15:
              label: "1.5 ÜST"
              min_odds: 1.12
              max_odds: 1.55
              risk_weight: 7.0

            U35:
              label: "3.5 ALT"
              min_odds: 1.12
              max_odds: 1.65
              risk_weight: 9.0

            U45:
              label: "4.5 ALT"
              min_odds: 1.05
              max_odds: 1.38
              risk_weight: 5.0

            U55:
              label: "5.5 ALT"
              min_odds: 1.01
              max_odds: 1.22
              risk_weight: 3.0

            DC_1X:
              label: "1X"
              min_odds: 1.08
              max_odds: 1.55
              risk_weight: 8.0

            DC_X2:
              label: "X2"
              min_odds: 1.08
              max_odds: 1.55
              risk_weight: 8.0

            DC_12:
              label: "12"
              min_odds: 1.08
              max_odds: 1.65
              risk_weight: 10.0

            BTTS_NO:
              label: "KG YOK"
              min_odds: 1.25
              max_odds: 1.95
              risk_weight: 13.0

            BTTS_YES:
              label: "KG VAR"
              min_odds: 1.35
              max_odds: 2.05
              risk_weight: 16.0

            U25:
              label: "2.5 ALT"
              min_odds: 1.30
              max_odds: 2.05
              risk_weight: 15.0

            O25:
              label: "2.5 ÜST"
              min_odds: 1.35
              max_odds: 2.10
              risk_weight: 18.0
          YAML

          echo "Config oluşturuldu:"
          ls -la config
          echo "Kontrol:"
          python - <<'PY'
          import yaml
          with open("config/safe_market_backtest.yml", "r", encoding="utf-8") as f:
              cfg = yaml.safe_load(f)
          required = ["database", "backtest", "markets", "thresholds", "scoring", "risk"]
          missing = [x for x in required if x not in cfg]
          if missing:
              raise SystemExit(f"Eksik config bölümü: {missing}")
          print("Config sağlam:", ", ".join(required))
          PY

      - name: Safe Market Backtest Çalıştır
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ] && [ -n "${{ github.event.inputs.end_date }}" ]; then
            python safe_market_backtest.py --config config/safe_market_backtest.yml --start "${{ github.event.inputs.start_date }}" --end "${{ github.event.inputs.end_date }}"
          else
            python safe_market_backtest.py --config config/safe_market_backtest.yml
          fi
