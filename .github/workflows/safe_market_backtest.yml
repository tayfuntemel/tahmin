model:
  weights:
    league: 0.40
    home_team: 0.22
    away_team: 0.22
    h2h: 0.16

risk:
  # Yüksek bahis profili: az maç, sert eleme.
  max_daily_picks: 3

  min_league_sample: 45
  min_team_sample: 8
  min_total_sample: 70
  min_h2h_sample_for_weight: 3
  shrink_until_sample: 180

  min_model_probability: 74.0
  min_edge: 1.50
  min_confidence: 78.0
  max_risk_score: 24.0

  disagreement_penalty_multiplier: 0.55
  market_risk_multiplier: 4.0
  edge_confidence_multiplier: 0.20

markets:
  # En güvenli düşük varyanslı marketler üstte.
