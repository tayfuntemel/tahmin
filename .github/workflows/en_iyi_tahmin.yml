name: En İyi Tahminleri Kaydet

on:
  schedule:
    # Günde 6 kez çalışır (Her 4 saatte bir: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
    - cron: '0 */4 * * *'
  
  # GitHub arayüzünden manuel olarak tetikleyebilmen için:
  workflow_dispatch: 

jobs:
  tahmin-kaydet:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Repoyu Klonla
        uses: actions/checkout@v4

      - name: 🐍 Python'u Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python

      - name: 🚀 En İyi Tahminleri Veritabanına Yaz
        run: python en_iyi_tahminleri_kaydet.py
